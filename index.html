<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ELZ STORE</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#09090f;--surface:#12121c;--surface2:#1a1a28;--border:#2a2a40;--accent:#7c3aed;--accent2:#06d6a0;--text:#f0f0ff;--muted:#6b6b8a;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(124,58,237,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;}
.orb-1{width:500px;height:500px;background:rgba(124,58,237,.18);top:-100px;right:-100px;}
.orb-2{width:400px;height:400px;background:rgba(6,214,160,.10);bottom:100px;left:-100px;}

header{position:relative;z-index:10;text-align:center;padding:70px 20px 50px;}
.store-badge{display:inline-block;background:linear-gradient(135deg,rgba(124,58,237,.3),rgba(6,214,160,.2));border:1px solid rgba(124,58,237,.4);color:var(--accent2);font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;padding:6px 18px;border-radius:100px;margin-bottom:20px;animation:fadeUp .6s ease both;}
h1.store-title{font-size:clamp(2.2rem,8vw,4.5rem);font-weight:800;line-height:1.05;background:linear-gradient(135deg,#fff 30%,#a78bfa 70%,#06d6a0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:fadeUp .6s .1s ease both;margin-bottom:14px;}
.store-tagline{color:var(--muted);font-size:1rem;animation:fadeUp .6s .2s ease both;margin-bottom:36px;}
.header-actions{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;animation:fadeUp .6s .3s ease both;}
.header-contact{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;text-decoration:none;font-weight:700;font-size:.95rem;padding:13px 28px;border-radius:12px;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 30px rgba(124,58,237,.35);}
.header-contact:hover{transform:translateY(-2px);box-shadow:0 8px 40px rgba(124,58,237,.5);}
.admin-badge{display:none;align-items:center;gap:8px;background:rgba(6,214,160,.15);border:1px solid rgba(6,214,160,.3);color:var(--accent2);font-size:.8rem;font-weight:700;padding:10px 18px;border-radius:12px;font-family:'Space Mono',monospace;letter-spacing:1px;}
.admin-badge.show{display:inline-flex;}
.logout-btn{background:none;border:1px solid rgba(255,80,80,.3);color:#ff6b6b;font-size:.75rem;font-weight:700;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:'Space Mono',monospace;transition:all .2s;}
.logout-btn:hover{background:rgba(255,80,80,.15);}

.stats-bar{position:relative;z-index:10;display:flex;justify-content:center;max-width:560px;margin:0 auto 50px;padding:0 20px;animation:fadeUp .6s .35s ease both;}
.stat-item{flex:1;text-align:center;padding:18px 10px;background:var(--surface);border:1px solid var(--border);}
.stat-item:first-child{border-radius:12px 0 0 12px;}
.stat-item:last-child{border-radius:0 12px 12px 0;}
.stat-item+.stat-item{border-left:none;}
.stat-num{font-size:1.5rem;font-weight:800;color:var(--accent2);display:block;}
.stat-label{font-size:.7rem;color:var(--muted);font-weight:600;letter-spacing:1px;}

.filter-bar{position:relative;z-index:10;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:0 20px 44px;animation:fadeUp .6s .4s ease both;}
.filter-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'Syne',sans-serif;font-size:.82rem;font-weight:600;padding:8px 18px;border-radius:100px;cursor:pointer;transition:all .2s;}
.filter-btn:hover,.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 20px rgba(124,58,237,.4);}

.products-grid{position:relative;z-index:10;display:grid;grid-template-columns:repeat(2,1fr);gap:18px;max-width:1100px;margin:0 auto;padding:0 20px 80px;}
@media(max-width:640px){.products-grid{grid-template-columns:1fr;}}

.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:26px;position:relative;overflow:hidden;transition:transform .3s,border-color .3s,box-shadow .3s;animation:cardIn .5s ease both;display:flex;flex-direction:column;}
.card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top right,rgba(124,58,237,.15),transparent 70%);pointer-events:none;opacity:0;transition:opacity .3s;}
.card:hover{transform:translateY(-5px);border-color:var(--accent);box-shadow:0 20px 60px rgba(124,58,237,.2);}
.card:hover::before{opacity:1;}
.card-badge{position:absolute;top:18px;right:18px;font-size:.65rem;font-weight:700;font-family:'Space Mono',monospace;padding:4px 10px;border-radius:100px;letter-spacing:1px;color:#fff;}
.card-icon{font-size:2.4rem;margin-bottom:14px;display:block;}
.card-category{font-size:.68rem;font-weight:700;letter-spacing:2px;color:var(--accent2);font-family:'Space Mono',monospace;margin-bottom:5px;}
.card-name{font-size:1.3rem;font-weight:800;margin-bottom:9px;}
.card-desc{font-size:.86rem;color:var(--muted);line-height:1.6;margin-bottom:16px;flex:1;}
.features-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
.feature-tag{background:var(--surface2);border:1px solid var(--border);color:#a78bfa;font-size:.7rem;font-weight:600;padding:3px 9px;border-radius:6px;font-family:'Space Mono',monospace;}
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:auto;}
.price-label{font-size:.65rem;color:var(--muted);font-weight:600;letter-spacing:1px;}
.price-amount{font-size:1.4rem;font-weight:800;line-height:1;}
.price-amount span{font-size:.8rem;color:var(--muted);font-weight:600;}
.order-btn{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;text-decoration:none;font-weight:700;font-size:.83rem;padding:11px 18px;border-radius:10px;transition:transform .2s,box-shadow .2s;white-space:nowrap;box-shadow:0 4px 20px rgba(124,58,237,.3);}
.order-btn:hover{transform:scale(1.05);box-shadow:0 6px 30px rgba(124,58,237,.5);}

.admin-actions{display:none;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
body.admin-mode .admin-actions{display:flex;}
.btn-edit,.btn-delete{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700;padding:8px 12px;border-radius:8px;cursor:pointer;border:1px solid;transition:all .2s;}
.btn-edit{background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.3);color:#a78bfa;}
.btn-edit:hover{background:rgba(124,58,237,.3);color:#fff;}
.btn-delete{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.25);color:#f87171;}
.btn-delete:hover{background:rgba(239,68,68,.3);color:#fff;}

.add-card{background:transparent;border:2px dashed var(--border);border-radius:20px;padding:26px;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:all .3s;min-height:260px;text-align:center;}
body.admin-mode .add-card{display:flex;}
.add-card:hover{border-color:var(--accent);background:rgba(124,58,237,.05);}
.add-icon{font-size:2.8rem;opacity:.35;transition:opacity .3s;}
.add-card:hover .add-icon{opacity:1;}
.add-text{color:var(--muted);font-size:.9rem;font-weight:600;transition:color .3s;}
.add-card:hover .add-text{color:var(--accent2);}
.add-sub{color:var(--border);font-size:.72rem;font-family:'Space Mono',monospace;}

.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:36px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;transform:scale(.95) translateY(20px);transition:transform .3s;position:relative;}
.modal-overlay.open .modal{transform:scale(1) translateY(0);}
.modal h2{font-size:1.4rem;font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,#fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.modal-sub{color:var(--muted);font-size:.85rem;margin-bottom:26px;}
.close-btn{position:absolute;top:18px;right:18px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.close-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}

.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:.75rem;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:7px;font-family:'Space Mono',monospace;}
.form-group input,.form-group textarea,.form-group select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Syne',sans-serif;font-size:.88rem;padding:12px 14px;border-radius:10px;outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--accent);}
.form-group textarea{resize:vertical;min-height:75px;}
.form-group select option{background:var(--surface2);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;}
.submit-btn{width:100%;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;padding:13px;border-radius:10px;cursor:pointer;transition:box-shadow .2s,transform .2s;box-shadow:0 4px 20px rgba(124,58,237,.3);}
.submit-btn:hover{box-shadow:0 6px 30px rgba(124,58,237,.5);transform:translateY(-1px);}
.cancel-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;padding:13px;border-radius:10px;cursor:pointer;transition:all .2s;}
.cancel-btn:hover{border-color:var(--accent);color:var(--text);}

.lock-icon{font-size:3rem;text-align:center;margin-bottom:16px;}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:44px;}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:0;}
.login-error{color:#ff6b6b;font-size:.8rem;font-family:'Space Mono',monospace;margin-top:8px;display:none;text-align:center;}
.login-error.show{display:block;}

.confirm-icon{font-size:3rem;text-align:center;margin-bottom:12px;}

.fab{position:fixed;bottom:28px;right:28px;z-index:999;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#5b21b6);border:none;color:#fff;font-size:1.4rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;box-shadow:0 4px 24px rgba(124,58,237,.5);}
.fab:hover{transform:scale(1.1);box-shadow:0 8px 32px rgba(124,58,237,.7);}

footer{position:relative;z-index:10;text-align:center;padding:40px 20px 100px;color:var(--muted);font-size:.82rem;}
footer a{color:var(--accent2);text-decoration:none;}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);font-weight:700;padding:11px 22px;border-radius:100px;z-index:9999;transition:transform .3s;font-size:.88rem;white-space:nowrap;background:var(--accent2);color:#000;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{background:#ef4444;color:#fff;}
.toast.warn{background:#f59e0b;color:#000;}

@keyframes fadeUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
@media(max-width:560px){.form-row,.btn-row{grid-template-columns:1fr;}.stats-bar{flex-wrap:wrap;}.stat-item{flex:1 1 45%;}.stat-item:first-child{border-radius:12px 0 0 0;}.stat-item:nth-child(2){border-radius:0 12px 0 0;border-left:1px solid var(--border);}.stat-item:nth-child(3){border-radius:0 0 0 12px;border-top:none;}.stat-item:last-child{border-radius:0 0 12px 0;border-left:1px solid var(--border);border-top:none;}.stat-item+.stat-item{border-left:none;}}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<header>

      🛡️ ADMIN MODE
      <button class="logout-btn" id="logoutBtn">Keluar</button>
    </div>
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>
<div class="filter-bar" id="filterBar"></div>
<div class="products-grid" id="grid"></div>

<!-- LOGIN MODAL -->
<div class="modal-overlay" id="loginModal">
  <div class="modal" style="max-width:360px;">
    <div class="lock-icon">🔐</div>
    <h2 style="text-align:center;">Admin Login</h2>
    <p class="modal-sub" style="text-align:center;">Masukkan password admin.</p>
    <div class="form-group">
      <label>PASSWORD</label>
      <div class="pw-wrap">
        <input type="password" id="pwInput" placeholder="••••••••"/>
        <button class="pw-eye" id="pwEye" type="button">👁️</button>
      </div>
    </div>
    <div class="login-error" id="loginErr">❌ Password salah!</div>
    <button class="submit-btn" id="loginBtn" style="margin-top:16px;">🔓 Masuk</button>
  </div>
</div>

<!-- PRODUK MODAL (tambah & edit) -->
<div class="modal-overlay" id="prodModal">
  <div class="modal">
    <button class="close-btn" id="closeProdModal">✕</button>
    <h2 id="prodModalTitle">➕ Tambah Produk</h2>
    <p class="modal-sub" id="prodModalSub">Produk tersimpan di browser ini.</p>
    <input type="hidden" id="fId"/>
    <div class="form-row">
      <div class="form-group"><label>NAMA *</label><input type="text" id="fName" placeholder="Bot Baru"/></div>
      <div class="form-group"><label>EMOJI</label><input type="text" id="fIcon" placeholder="🤖" maxlength="2"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>KATEGORI</label>
        <select id="fCat"><option>Bot</option><option>Tools</option><option>Payment</option><option>Hosting</option></select>
      </div>
      <div class="form-group"><label>HARGA (Rp)</label><input type="number" id="fPrice" placeholder="50000"/></div>
    </div>
    <div class="form-group"><label>DESKRIPSI *</label><textarea id="fDesc" placeholder="Deskripsi produk..."></textarea></div>
    <div class="form-group"><label>FITUR (pisah koma)</label><input type="text" id="fFeats" placeholder="Fitur 1, Fitur 2"/></div>
    <div class="form-row">
      <div class="form-group"><label>BADGE (opsional)</label><input type="text" id="fBadge" placeholder="NEW"/></div>
      <div class="form-group"><label>WARNA BADGE</label><input type="color" id="fColor" value="#7c3aed" style="height:42px;padding:4px 6px;cursor:pointer;"/></div>
    </div>
    <div class="btn-row">
      <button class="cancel-btn" id="cancelProd">Batal</button>
      <button class="submit-btn" id="saveProd">💾 Simpan</button>
    </div>
  </div>
</div>

<!-- HAPUS MODAL -->
<div class="modal-overlay" id="delModal">
  <div class="modal" style="max-width:360px;text-align:center;">
    <div class="confirm-icon" id="delIcon">🗑️</div>
    <h2 id="delTitle">Hapus Produk?</h2>
    <p class="modal-sub" id="delSub"></p>
    <div class="btn-row">
      <button class="cancel-btn" id="cancelDel">Batal</button>
      <button class="submit-btn" id="confirmDel">🗑️ Hapus</button>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fab">🔑</button>

<footer>
  <p>© 2025 <strong id="footerName"></strong> · <a id="footerTg" href="#" target="_blank"></a></p>
  <p style="margin-top:6px;font-family:'Space Mono',monospace;font-size:.68rem;opacity:.4;">Ganti password di CONFIG dalam file HTML</p>
</footer>
<div class="toast" id="toast"></div>

  try {
    var raw = localStorage.getItem('elzstore_v3');
    if (raw) { var d = JSON.parse(raw); extraProducts = d.extras || []; overrides = d.overrides || {}; }
  } catch(e) {}
})();

function saveToLS() {
  try { localStorage.setItem('elzstore_v3', JSON.stringify({extras: extraProducts, overrides: overrides})); } catch(e) {}
}

function getAllProducts() {
  var defaults = CONFIG.defaultProducts.map(function(p) {
    return overrides[p.id] ? Object.assign({}, p, overrides[p.id]) : Object.assign({}, p);
  });
  return defaults.concat(extraProducts);
}

// ── Utils ──
function fmt(n) { return String(n).replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }
function tgLink(msg) { return CONFIG.store.telegram + '?text=' + encodeURIComponent(msg); }

function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.className = 'toast'; }, 3000);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ── Apply store info ──
document.getElementById('storeBadge').textContent   = CONFIG.store.badge;
document.getElementById('storeTitle').textContent   = CONFIG.store.name;
document.getElementById('storeTagline').textContent = CONFIG.store.tagline;
document.getElementById('footerName').textContent   = CONFIG.store.name;
document.getElementById('tgBtn').href               = CONFIG.store.telegram;
document.getElementById('footerTg').href            = CONFIG.store.telegram;
document.getElementById('footerTg').textContent     = CONFIG.store.telegramUsername;
document.title = CONFIG.store.name;

// ── Render Stats ──
function renderStats() {
  var all = getAllProducts();
  var cats = {};
  all.forEach(function(p){ cats[p.category] = 1; });
  var minP = all.reduce(function(m,p){ return Math.min(m,p.price); }, Infinity);
  document.getElementById('statsBar').innerHTML =
    '<div class="stat-item"><span class="stat-num">'+all.length+'</span><span class="stat-label">PRODUK</span></div>' +
    '<div class="stat-item"><span class="stat-num">'+Object.keys(cats).length+'</span><span class="stat-label">KATEGORI</span></div>' +
    '<div class="stat-item"><span class="stat-num">24/7</span><span class="stat-label">SUPPORT</span></div>' +
    '<div class="stat-item"><span class="stat-num">'+CONFIG.store.currency+Math.round(minP/1000)+'K</span><span class="stat-label">MULAI DARI</span></div>';
}

// ── Render Filter ──
function renderFilter() {
  var bar = document.getElementById('filterBar');
  bar.innerHTML = '';
  CONFIG.categories.forEach(function(cat) {
    var btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === activeFilter ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = function() { activeFilter = cat; renderFilter(); renderGrid(); };
    bar.appendChild(btn);
  });
}

// ── Render Grid ──
function renderGrid() {
  var grid = document.getElementById('grid');
  var all = getAllProducts();
  var list = activeFilter === 'Semua' ? all : all.filter(function(p){ return p.category === activeFilter; });
  grid.innerHTML = '';

  list.forEach(function(p, i) {
    var isExtra = !CONFIG.defaultProducts.find(function(d){ return d.id === p.id; });
    var card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (i * 0.05) + 's';

    var featsHtml = p.features.map(function(f){ return '<span class="feature-tag">'+f+'</span>'; }).join('');
    var badgeHtml = p.badge ? '<div class="card-badge" style="background:'+p.badgeColor+'">'+p.badge+'</div>' : '';
    var actionBtnLabel = isExtra ? '🗑️ Hapus' : '🔄 Reset';

    card.innerHTML =
      badgeHtml +
      '<span class="card-icon">'+p.icon+'</span>' +
      '<div class="card-category">'+p.category+'</div>' +
      '<div class="card-name">'+p.name+'</div>' +
      '<div class="card-desc">'+p.description+'</div>' +
      '<div class="features-list">'+featsHtml+'</div>' +
      '<div class="card-footer">' +
        '<div><div class="price-label">HARGA</div><div class="price-amount"><span>'+CONFIG.store.currency+' </span>'+fmt(p.price)+'</div></div>' +
        '<a href="'+tgLink(p.orderMessage)+'" target="_blank" class="order-btn">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.927 13.01 5.07 12.12c-.652-.204-.664-.652.136-.964l11.17-4.307c.54-.196 1.016.12.518 1.372z"/></svg>' +
          'Order' +
        '</a>' +
      '</div>' +
      '<div class="admin-actions">' +
        '<button class="btn-edit" data-id="'+p.id+'">✏️ Edit</button>' +
        '<button class="btn-delete" data-id="'+p.id+'" data-name="'+p.name+'" data-extra="'+(isExtra?'1':'0')+'">'+actionBtnLabel+'</button>' +
      '</div>';

    grid.appendChild(card);
  });

  // Tombol tambah
  var addCard = document.createElement('div');
  addCard.className = 'add-card';
  addCard.innerHTML = '<div class="add-icon">➕</div><div class="add-text">Tambah Produk Baru</div><div class="add-sub">Tersimpan permanen di browser</div>';
  addCard.onclick = function() { openAddModal(); };
  grid.appendChild(addCard);

  // Events edit & delete
  grid.querySelectorAll('.btn-edit').forEach(function(btn) {
    btn.addEventListener('click', function() { openEditModal(parseInt(btn.getAttribute('data-id'))); });
  });
  grid.querySelectorAll('.btn-delete').forEach(function(btn) {
    btn.addEventListener('click', function() {
      openDelModal(parseInt(btn.getAttribute('data-id')), btn.getAttribute('data-name'), btn.getAttribute('data-extra') === '1');
    });
  });
}

function renderAll() { renderStats(); renderFilter(); renderGrid(); }

// ── FORM helpers ──
function clearForm() {
  ['fId','fName','fIcon','fDesc','fFeats','fBadge','fPrice'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('fColor').value = '#7c3aed';
  document.getElementById('fCat').value = 'Bot';
}

function openAddModal() {
  isEditMode = false;
  clearForm();
  document.getElementById('prodModalTitle').textContent = '➕ Tambah Produk';
  document.getElementById('prodModalSub').textContent   = 'Produk tersimpan permanen di browser.';
  document.getElementById('saveProd').textContent = '💾 Simpan Produk';
  openModal('prodModal');
}

function openEditModal(id) {
  var all = getAllProducts();
  var p = null;
  for (var i=0; i<all.length; i++) { if (all[i].id === id) { p = all[i]; break; } }
  if (!p) return;
  isEditMode = true;
  clearForm();
  document.getElementById('fId').value    = p.id;
  document.getElementById('fName').value  = p.name;
  document.getElementById('fIcon').value  = p.icon || '';
  document.getElementById('fCat').value   = p.category;
  document.getElementById('fPrice').value = p.price;
  document.getElementById('fDesc').value  = p.description;
  document.getElementById('fFeats').value = p.features.join(', ');
  document.getElementById('fBadge').value = p.badge || '';
  document.getElementById('fColor').value = p.badgeColor || '#7c3aed';
  document.getElementById('prodModalTitle').textContent = '✏️ Edit: ' + p.name;
  document.getElementById('prodModalSub').textContent   = 'Ubah data produk lalu simpan.';
  document.getElementById('saveProd').textContent = '💾 Simpan Perubahan';
  openModal('prodModal');
}

function openDelModal(id, name, isExtra) {
  pendingDelId = id;
  if (isExtra) {
    document.getElementById('delIcon').textContent  = '🗑️';
    document.getElementById('delTitle').textContent = 'Hapus Produk?';
    document.getElementById('delSub').innerHTML     = 'Produk <strong style="color:var(--accent2)">'+name+'</strong> akan dihapus permanen.';
    document.getElementById('confirmDel').textContent = '🗑️ Hapus';
    document.getElementById('confirmDel').style.background = 'linear-gradient(135deg,#ef4444,#b91c1c)';
  } else {
    document.getElementById('delIcon').textContent  = '🔄';
    document.getElementById('delTitle').textContent = 'Reset Produk?';
    document.getElementById('delSub').innerHTML     = 'Produk <strong style="color:var(--accent2)">'+name+'</strong> akan dikembalikan ke data awal.';
    document.getElementById('confirmDel').textContent = '🔄 Reset';
    document.getElementById('confirmDel').style.background = 'linear-gradient(135deg,#f59e0b,#d97706)';
  }
  openModal('delModal');
}

// ── Save produk ──
document.getElementById('saveProd').addEventListener('click', function() {
  var name = document.getElementById('fName').value.trim();
  var desc = document.getElementById('fDesc').value.trim();
  if (!name || !desc) { toast('❌ Nama & deskripsi wajib diisi!','err'); return; }

  var price    = parseInt(document.getElementById('fPrice').value) || 0;
  var icon     = document.getElementById('fIcon').value.trim() || '📦';
  var cat      = document.getElementById('fCat').value;
  var featsRaw = document.getElementById('fFeats').value.trim();
  var features = featsRaw ? featsRaw.split(',').map(function(f){ return f.trim(); }).filter(Boolean) : [];
  var badge    = document.getElementById('fBadge').value.trim() || null;
  var color    = badge ? document.getElementById('fColor').value : null;
  var orderMsg = 'Halo, saya ingin order '+name+'. Tolong info lebih lanjut!';

  var data = {name:name,icon:icon,category:cat,description:desc,features:features,price:price,badge:badge,badgeColor:color,orderMessage:orderMsg};

  if (isEditMode) {
    var id = parseInt(document.getElementById('fId').value);
    var isDefault = CONFIG.defaultProducts.find(function(d){ return d.id === id; });
    if (isDefault) {
      overrides[id] = data;
    } else {
      for (var i=0; i<extraProducts.length; i++) {
        if (extraProducts[i].id === id) { extraProducts[i] = Object.assign({}, extraProducts[i], data); break; }
      }
    }
    toast('✅ "'+name+'" berhasil diperbarui!');
  } else {
    data.id = Date.now();
    extraProducts.push(data);
    toast('✅ "'+name+'" berhasil ditambahkan!');
  }

  saveToLS();
  closeModal('prodModal');
  activeFilter = 'Semua';
  renderAll();
});

// ── Konfirmasi hapus ──
document.getElementById('confirmDel').addEventListener('click', function() {
  if (!pendingDelId) return;
  var isDefault = CONFIG.defaultProducts.find(function(d){ return d.id === pendingDelId; });
  if (isDefault) {
    delete overrides[pendingDelId];
    toast('🔄 Produk direset ke data awal','warn');
  } else {
    extraProducts = extraProducts.filter(function(p){ return p.id !== pendingDelId; });
    toast('🗑️ Produk berhasil dihapus');
  }
  saveToLS();
  pendingDelId = null;
  closeModal('delModal');
  renderAll();
});

document.getElementById('cancelDel').addEventListener('click', function(){ closeModal('delModal'); });
document.getElementById('delModal').addEventListener('click', function(e){ if(e.target.id==='delModal') closeModal('delModal'); });

document.getElementById('closeProdModal').addEventListener('click', function(){ closeModal('prodModal'); });
document.getElementById('cancelProd').addEventListener('click', function(){ closeModal('prodModal'); });
document.getElementById('prodModal').addEventListener('click', function(e){ if(e.target.id==='prodModal') closeModal('prodModal'); });

// ── Admin ──
function setAdmin(on) {
  isAdmin = on;
  document.body.classList.toggle('admin-mode', on);
  document.getElementById('adminBadge').classList.toggle('show', on);
  document.getElementById('fab').textContent = on ? '➕' : '🔑';
  renderGrid();
}

document.getElementById('fab').addEventListener('click', function() {
  if (isAdmin) { openAddModal(); }
  else { openModal('loginModal'); setTimeout(function(){ document.getElementById('pwInput').focus(); }, 150); }
});

function doLogin() {
  var pw = document.getElementById('pwInput').value;
  if (pw === CONFIG.adminPassword) {
    document.getElementById('loginErr').classList.remove('show');
    document.getElementById('pwInput').value = '';
    closeModal('loginModal');
    setAdmin(true);
    toast('✅ Selamat datang, Admin!');
  } else {
    document.getElementById('loginErr').classList.add('show');
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('pwInput').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
document.getElementById('pwEye').addEventListener('click', function(){
  var i = document.getElementById('pwInput');
  i.type = i.type === 'password' ? 'text' : 'password';
});
document.getElementById('loginModal').addEventListener('click', function(e){ if(e.target.id==='loginModal') closeModal('loginModal'); });
document.getElementById('logoutBtn').addEventListener('click', function(){ setAdmin(false); toast('👋 Keluar dari mode admin'); });

// ── Boot ──
renderAll();
</script>
</body>
</html>
