<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bot Store</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #09090f;
    --surface: #12121c;
    --surface2: #1a1a28;
    --border: #2a2a40;
    --accent: #7c3aed;
    --accent2: #06d6a0;
    --text: #f0f0ff;
    --muted: #6b6b8a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(124,58,237,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
  .orb-1 { width: 500px; height: 500px; background: rgba(124,58,237,.18); top: -100px; right: -100px; }
  .orb-2 { width: 400px; height: 400px; background: rgba(6,214,160,.10); bottom: 100px; left: -100px; }

  header {
    position: relative; z-index: 10;
    text-align: center;
    padding: 70px 20px 50px;
  }
  .store-badge {
    display: inline-block;
    background: linear-gradient(135deg, rgba(124,58,237,.3), rgba(6,214,160,.2));
    border: 1px solid rgba(124,58,237,.4);
    color: var(--accent2);
    font-family: 'Space Mono', monospace;
    font-size: 11px; letter-spacing: 3px;
    padding: 6px 18px; border-radius: 100px;
    margin-bottom: 20px;
    animation: fadeUp .6s ease both;
  }
  h1.store-title {
    font-size: clamp(2.2rem, 8vw, 4.5rem);
    font-weight: 800; line-height: 1.05;
    background: linear-gradient(135deg, #fff 30%, #a78bfa 70%, #06d6a0 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    animation: fadeUp .6s .1s ease both;
    margin-bottom: 14px;
  }
  .store-tagline {
    color: var(--muted); font-size: 1rem;
    animation: fadeUp .6s .2s ease both; margin-bottom: 36px;
  }
  .header-contact {
    display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, #7c3aed, #5b21b6);
    color: #fff; text-decoration: none; font-weight: 700; font-size: .95rem;
    padding: 13px 28px; border-radius: 12px;
    animation: fadeUp .6s .3s ease both;
    transition: transform .2s, box-shadow .2s;
    box-shadow: 0 4px 30px rgba(124,58,237,.35);
  }
  .header-contact:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(124,58,237,.5); }

  .stats-bar {
    position: relative; z-index: 10;
    display: flex; justify-content: center;
    max-width: 560px; margin: 0 auto 50px;
    padding: 0 20px;
    animation: fadeUp .6s .35s ease both;
  }
  .stat-item {
    flex: 1; text-align: center; padding: 18px 10px;
    background: var(--surface); border: 1px solid var(--border);
  }
  .stat-item:first-child { border-radius: 12px 0 0 12px; }
  .stat-item:last-child { border-radius: 0 12px 12px 0; }
  .stat-item + .stat-item { border-left: none; }
  .stat-num { font-size: 1.5rem; font-weight: 800; color: var(--accent2); display: block; }
  .stat-label { font-size: .7rem; color: var(--muted); font-weight: 600; letter-spacing: 1px; }

  .filter-bar {
    position: relative; z-index: 10;
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    padding: 0 20px 44px;
    animation: fadeUp .6s .4s ease both;
  }
  .filter-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); font-family: 'Syne', sans-serif;
    font-size: .82rem; font-weight: 600;
    padding: 8px 18px; border-radius: 100px;
    cursor: pointer; transition: all .2s; letter-spacing: .5px;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent); border-color: var(--accent); color: #fff;
    box-shadow: 0 4px 20px rgba(124,58,237,.4);
  }

  .products-grid {
    position: relative; z-index: 10;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 18px;
    max-width: 1200px; margin: 0 auto;
    padding: 0 20px 60px;
  }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 26px;
    position: relative; overflow: hidden;
    transition: transform .3s, border-color .3s, box-shadow .3s;
    animation: cardIn .5s ease both;
    display: flex; flex-direction: column;
  }
  .card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at top right, rgba(124,58,237,.15), transparent 70%);
    pointer-events: none; opacity: 0; transition: opacity .3s;
  }
  .card:hover { transform: translateY(-6px); border-color: var(--accent); box-shadow: 0 20px 60px rgba(124,58,237,.2); }
  .card:hover::before { opacity: 1; }

  .card-badge {
    position: absolute; top: 18px; right: 18px;
    font-size: .65rem; font-weight: 700;
    font-family: 'Space Mono', monospace;
    padding: 4px 10px; border-radius: 100px;
    letter-spacing: 1px; color: #fff;
  }
  .card-icon { font-size: 2.4rem; margin-bottom: 14px; display: block; }
  .card-category {
    font-size: .68rem; font-weight: 700; letter-spacing: 2px;
    color: var(--accent2); font-family: 'Space Mono', monospace; margin-bottom: 5px;
  }
  .card-name { font-size: 1.3rem; font-weight: 800; margin-bottom: 9px; }
  .card-desc { font-size: .86rem; color: var(--muted); line-height: 1.6; margin-bottom: 16px; flex: 1; }
  .features-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
  .feature-tag {
    background: var(--surface2); border: 1px solid var(--border);
    color: #a78bfa; font-size: .7rem; font-weight: 600;
    padding: 3px 9px; border-radius: 6px; font-family: 'Space Mono', monospace;
  }
  .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .price-label { font-size: .65rem; color: var(--muted); font-weight: 600; letter-spacing: 1px; }
  .price-amount { font-size: 1.4rem; font-weight: 800; line-height: 1; }
  .price-amount span { font-size: .8rem; color: var(--muted); font-weight: 600; }
  .order-btn {
    display: inline-flex; align-items: center; gap: 7px;
    background: linear-gradient(135deg, #7c3aed, #5b21b6);
    color: #fff; text-decoration: none; font-weight: 700; font-size: .83rem;
    padding: 11px 18px; border-radius: 10px;
    transition: transform .2s, box-shadow .2s;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(124,58,237,.3);
  }
  .order-btn:hover { transform: scale(1.05); box-shadow: 0 6px 30px rgba(124,58,237,.5); }

  /* ADD CARD */
  .add-card {
    background: transparent; border: 2px dashed var(--border);
    border-radius: 20px; padding: 26px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    cursor: pointer; transition: all .3s; min-height: 300px; text-align: center;
  }
  .add-card:hover { border-color: var(--accent); background: rgba(124,58,237,.05); }
  .add-icon { font-size: 2.8rem; opacity: .35; transition: opacity .3s; }
  .add-card:hover .add-icon { opacity: 1; }
  .add-text { color: var(--muted); font-size: .9rem; font-weight: 600; transition: color .3s; }
  .add-card:hover .add-text { color: var(--accent2); }
  .add-sub { color: var(--border); font-size: .72rem; font-family: 'Space Mono', monospace; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,.8); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 24px; padding: 34px;
    width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
    transform: scale(.95) translateY(20px); transition: transform .3s; position: relative;
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }
  .modal h2 {
    font-size: 1.4rem; font-weight: 800; margin-bottom: 6px;
    background: linear-gradient(135deg, #fff, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .modal-sub { color: var(--muted); font-size: .85rem; margin-bottom: 24px; }
  .close-btn {
    position: absolute; top: 18px; right: 18px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); width: 30px; height: 30px; border-radius: 50%;
    cursor: pointer; font-size: .95rem;
    display: flex; align-items: center; justify-content: center; transition: all .2s;
  }
  .close-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block; font-size: .75rem; font-weight: 700;
    color: var(--muted); letter-spacing: 1px; margin-bottom: 7px;
    font-family: 'Space Mono', monospace;
  }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'Syne', sans-serif; font-size: .88rem;
    padding: 11px 14px; border-radius: 10px; outline: none; transition: border-color .2s;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 75px; }
  .form-group select option { background: var(--surface2); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .submit-btn {
    width: 100%; background: linear-gradient(135deg, #7c3aed, #5b21b6);
    color: #fff; border: none; font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: .95rem; padding: 13px;
    border-radius: 10px; cursor: pointer; margin-top: 6px;
    transition: box-shadow .2s, transform .2s;
    box-shadow: 0 4px 20px rgba(124,58,237,.3);
  }
  .submit-btn:hover { box-shadow: 0 6px 30px rgba(124,58,237,.5); transform: translateY(-1px); }

  footer {
    position: relative; z-index: 10; text-align: center;
    padding: 40px 20px 30px; color: var(--muted); font-size: .82rem;
  }
  footer a { color: var(--accent2); text-decoration: none; }

  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--accent2); color: #000;
    font-weight: 700; padding: 11px 22px; border-radius: 100px;
    z-index: 9999; transition: transform .3s; font-size: .88rem;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(18px) scale(.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  @media (max-width: 560px) {
    .form-row { grid-template-columns: 1fr; }
    .stats-bar { flex-wrap: wrap; }
    .stat-item { flex: 1 1 45%; }
    .stat-item:first-child { border-radius: 12px 0 0 0; }
    .stat-item:nth-child(2) { border-radius: 0 12px 0 0; border-left: 1px solid var(--border); }
    .stat-item:nth-child(3) { border-radius: 0 0 0 12px; border-top: none; }
    .stat-item:last-child { border-radius: 0 0 12px 0; border-left: 1px solid var(--border); border-top: none; }
    .stat-item + .stat-item { border-left: none; }
  }
</style>
</head>

  CONFIG.categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === activeFilter ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { activeFilter = cat; renderFilter(); renderGrid(); };
    bar.appendChild(btn);
  });
}

function renderGrid() {
  const grid = document.getElementById('productsGrid');
  const list = activeFilter === 'Semua' ? products : products.filter(p => p.category === activeFilter);
  grid.innerHTML = '';

  list.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (i * 0.05) + 's';
    card.innerHTML = `
      ${p.badge ? `<div class="card-badge" style="background:${p.badgeColor}">${p.badge}</div>` : ''}
      <span class="card-icon">${p.icon}</span>
      <div class="card-category">${p.category}</div>
      <div class="card-name">${p.name}</div>
      <div class="card-desc">${p.description}</div>
      <div class="features-list">${p.features.map(f => `<span class="feature-tag">${f}</span>`).join('')}</div>
      <div class="card-footer">
        <div>
          <div class="price-label">HARGA</div>
          <div class="price-amount"><span>${CONFIG.store.currency} </span>${fmtPrice(p.price)}</div>
        </div>
        <a href="${tgLink(p.orderMessage)}" target="_blank" class="order-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.927 13.01 5.07 12.12c-.652-.204-.664-.652.136-.964l11.17-4.307c.54-.196 1.016.12.518 1.372z"/></svg>
          Order
        </a>
      </div>
    `;
    grid.appendChild(card);
  });

  // Tombol tambah produk
  if (activeFilter === 'Semua') {
    const addCard = document.createElement('div');
    addCard.className = 'add-card';
    addCard.onclick = () => document.getElementById('modalOverlay').classList.add('open');
    addCard.innerHTML = `
      <div class="add-icon">➕</div>
      <div class="add-text">Tambah Produk Baru</div>
      <div class="add-sub">Klik untuk menambah produk</div>
    `;
    grid.appendChild(addCard);
  }
}

// Modal
document.getElementById('closeModal').onclick = () =>
  document.getElementById('modalOverlay').classList.remove('open');
document.getElementById('modalOverlay').onclick = (e) => {
  if (e.target.id === 'modalOverlay')
    document.getElementById('modalOverlay').classList.remove('open');
};

document.getElementById('submitProduct').onclick = () => {
  const name = document.getElementById('f-name').value.trim();
  const icon = document.getElementById('f-icon').value.trim() || '📦';
  const desc = document.getElementById('f-desc').value.trim();
  if (!name || !desc) { alert('Nama & deskripsi wajib diisi!'); return; }

  const price = parseInt(document.getElementById('f-price').value) || 0;
  const badge = document.getElementById('f-badge').value.trim() || null;
  const featsRaw = document.getElementById('f-features').value.trim();
  const features = featsRaw ? featsRaw.split(',').map(f => f.trim()).filter(Boolean) : [];

  products.push({
    id: Date.now(), name, icon,
    category: document.getElementById('f-category').value,
    description: desc, features, price,
    priceLabel: fmtPrice(price), badge,
    badgeColor: badge ? document.getElementById('f-badgeColor').value : null,
    orderMessage: `Halo, saya ingin order ${name}. Tolong info lebih lanjut!`,
  });

  activeFilter = 'Semua';
  renderStats(); renderFilter(); renderGrid();
  document.getElementById('modalOverlay').classList.remove('open');
  ['f-name','f-icon','f-desc','f-features','f-badge','f-price'].forEach(id =>
    document.getElementById(id).value = '');

  const toast = document.getElementById('toast');
  toast.textContent = `✅ "${name}" berhasil ditambahkan!`;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
};

renderStats(); renderFilter(); renderGrid();
</script>
</body>
</html>
